<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Amazon</title>
  
  <!-- description in the web -->
  <meta name="description" content="Amazon CRUD application"/>

  <!-- cdnfonts ember -->
  <link href="https://fonts.cdnfonts.com/css/amazon-ember?styles=109935,109928,109932,109925" rel="stylesheet">
  <!-- fallback font google roboto-->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

  
  <link rel="stylesheet" href="style/general.css" type="text/css">
  <link rel="stylesheet" href="style/utils.css" type="text/css">
  <link rel="stylesheet" href="style/components/header.css" type="text/css">
  <link rel="stylesheet" href="style/components/orders.css" type="text/css">

  

</head>
<body class="order">
                          <!-- header -->                         
  <header class="global-header container">

    <nav class="global-header__wrapper">

      <section class="global-header__left">
        <a href="index.html">
          <img class="global-header__left-home-icon-img" src="images/header/header-navbar/amazon-logo-white.png" alt="Amazon logo">
        </a>
      </section>

      <section class="global-header__middle">
        <form>
          <input class="global-header__middle-input input" placeholder="Search" type="search">
          <button class="global-header__middle-btn">
            <img class="global-header__middle-search-icon-img" src="images/header/header-navbar/search-icon.png" alt="Search-Icon">
          </button>
        </form>
      </section>
      
      <section class="global-header__right">
        <a class="global-header__right-return" href="orders.html">
          <span class="global-header__right-line1">Returns</span>
          <span class="global-header__right-line2">& Orders</span>
        </a>
        <a class="global-header__right-cart" href="checkout.html"> 
          <img class="global-header__right-cart-icon" src="images/header/header-navbar/cart-icon.png" alt="Cart-Icon">
          <div class="global-header__right-cart-count">3</div>
          <div class="global-header__right-cart-text">Cart</div>
        </a>
      </section>

    </nav>
  </header>

                          <!-- main -->

  <main class="hero-section-order container"> 
    
    <h1 class="hero-section-order__heading-txt">Your Orders</h1>

    <article class="order__wrapper">

            <!-- left section -->
      <section class="order__place-tot-id-section">
        <div class="order__placed-date">
          <span class="order__placed-txt">Order Placed:</span>
          <span>October 4</span>
        </div>
        <div class="order__price">
          <span class="order__total-txt">Total:</span>
          <span>$51.58</span>
        </div>
        <div class="order__ID-wrapper">
          <div class="order__ID">
            <span class="order__ID-txt">Order ID:</span>
            <span>5874d89e-2e00-72ba-5bb7-9900af021636</span>
          </div>
        </div>
      </section>

      <section class="order__product-details-section">
        <div class="order__product-section">
          <div class="order__product-image-cont">
            <img class="order__product-card-image" src="images/main/product-image/athletic-cotton-socks-6-pairs.jpg" alt="Product-Image">
          </div>
          
          <div class="order__product-details">
            <h3>Intermediate Size Basketball</h3>
            <span>Arriving on: October 8</span>
            <span>Quantity: 2</span>
            <button class="order__product-details-btn">
              <img class="order__product-details-btn-icon" src="images/order/buy-again-btn.png" alt="buy again icon">
              <a href="index.html">
                Buy it again
              </a>
            </button>
          </div>
        </div>

            <!-- right section -->

        <div class="order__track-pckg-wrapper">
          <a class="order__track-pckg" href="tracker.html">
            <button class="order__track-pckg-button">Track package</button>
          </a>
        </div>
      </section>
    </article>

  </main>
</body>
</html>
