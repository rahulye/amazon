<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=0.9">
  <title>Amazon</title>
  
  <!-- description in the web -->
  <meta name="description" content="Amazon CRUD application"/>

  <!-- cdnfonts ember -->
  <link href="https://fonts.cdnfonts.com/css/amazon-ember?styles=109935,109928,109932,109925" rel="stylesheet">
  <!-- fallback font google roboto-->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

  
  <link rel="stylesheet" href="style/general.css" type="text/css">
  <link rel="stylesheet" href="style/utils.css" type="text/css">
  <link rel="stylesheet" href="style/components/header.css" type="text/css">
  <link rel="stylesheet" href="style/components/main.css" type="text/css">
  

</head>
<body>

                      <!-- header -->

  <header class="global-header container">

    <nav class="global-header__wrapper">

      <section class="global-header__left">
        <img class="global-header__left-home-icon-img" src="images/header/header-navbar/amazon-logo-white.png" alt="Amazon logo">
      </section>

      <section class="global-header__middle">
        <form>
          <input class="global-header__middle-input input" placeholder="Search" type="search">
          <button class="global-header__middle-btn">
            <img class="global-header__middle-search-icon-img" src="images/header/header-navbar/search-icon.png" alt="Search-Icon">
          </button>
        </form>
      </section>
      
      <section class="global-header__right">
        <a class="global-header__right-return">
          <span class="global-header__right-line1">Returns</span>
          <span class="global-header__right-line2">& Orders</span>
        </a>
        <a class="global-header__right-cart" href="checkout.html"> 
          <img class="global-header__right-cart-icon" src="images/header/header-navbar/cart-icon.png" alt="Cart-Icon">
          <div class="global-header__right-cart-count js-cart-count">0</div>
          <div class="global-header__right-cart-text">Cart</div>
        </a>
      </section>

    </nav>
  </header>

                            <!-- main -->

  <main class="hero-section container">

    <section class="hero-section__wrapper js-hero-section__wrapper container">

      <article class="hero-section__product-card">
        
        <div class="hero-section__product-card-image-cont">
          <img class="hero-section__product-card-image" src="" alt="Product-Image">
        </div>
        <h2 class="hero-section__product-card-text"></h2>
        
        <div class="hero-section__product-card-rating-box">
          <img class="hero-section__product-card-rating-image" src="" alt="Product-Ratings-Imgae">
          <div class="hero-section__product-card-rating-count"></div>
        </div>

        <span class="hero-section__product-card-price"></span>
        
        <select class="hero-section__product-card-quantity">
              <option selected value="1">1</option>
              <option value="2">2</option>
              <option value="3">3</option>
              <option value="4">4</option>
              <option value="5">5</option>
              <option value="6">6</option>
              <option value="7">7</option>
              <option value="8">8</option>
              <option value="9">9</option>
              <option value="10">10</option>
        </select>

        <div class="hero-section__product-card-added-cont">
          <span class="hero-section__product-card-added-txt">Added</span>
          <img class="hero-section__product-card-added-img" src="images/main/icons/checkmark.png" alt="Add-icon-image">
        </div>

        <button class="hero-section__product-card-add-btn js-product-card-add-btn">Add to Cart</button>

      </article>
      
    </section>
  </main>  
  
  <script type="module" src="scripts/amazon.js"></script>
</body>
</html>
