<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=0.6">
  <title>Amazon</title>
  <link rel="icon" type="image/png" href="./images/main/icons/Amazon_icon.png">

  
  <!-- description in the web -->
  <meta name="description" content="Amazon CRUD application"/>

  <!-- cdnfonts ember -->
  <!-- <link href="https://fonts.cdnfonts.com/css/amazon-ember?styles=109935,109928,109932,109925" rel="stylesheet"> -->
  <!-- fallback font google roboto-->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

  
  <link rel="stylesheet" href="style/general.css" type="text/css">
  <link rel="stylesheet" href="style/utils.css" type="text/css">
  <link rel="stylesheet" href="style/components/header.css" type="text/css">
  <link rel="stylesheet" href="style/components/main.css" type="text/css">
  

</head>
<body>

                      <!-- header -->

  <header class="global-header container">
    <nav class="global-header__wrapper">
      
      <section class="global-header__left">
        <a href="index.html">
          <img class="global-header__left-home-icon-img" src="images/header/header-navbar/amazon-logo-white.png" alt="Amazon logo">
        </a>
      </section>

      <section class="global-header__middle">
        <form>
          <input class="global-header__middle-input input js-search-bar" placeholder="Search" type="">
          <button class="global-header__middle-btn js-search-btn">
            <img class="global-header__middle-search-icon-img" src="images/header/header-navbar/search-icon.png" alt="Search-Icon">
          </button>
        </form>
      </section>
      
      <section class="global-header__right">
        <a class="global-header__right-return" href="orders.html">
          <span class="global-header__right-line1">Returns</span>
          <span class="global-header__right-line2">& Orders</span>
        </a>
        <a class="global-header__right-cart" href="checkout.html"> 
          <img class="global-header__right-cart-icon" src="images/header/header-navbar/cart-icon.png" alt="Cart-Icon">
          <div class="global-header__right-cart-count js-cart-count">0</div>
          <div class="global-header__right-cart-text">Cart</div>
        </a>
      </section>
    
    </nav>
  </header>

                            <!-- main -->
                             
  <main class="hero-section container">
    <section class="hero-section__wrapper js-hero-section__wrapper container">
    </section>
  </main>  
  
  <script type="module" src="scripts/amazon.js"></script>
</body>
</html>
