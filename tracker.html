<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=0.56">
  <title>Amazon</title>
  <link rel="icon" type="image/png" href="./images/main/icons/Amazon_icon.png">

  <!-- description in the web -->
  <meta name="description" content="Amazon CRUD application"/>

  <!-- cdnfonts ember -->
  <!-- <link href="https://fonts.cdnfonts.com/css/amazon-ember?styles=109935,109928,109932,109925" rel="stylesheet"> -->
  <!-- fallback font google roboto-->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

  
  <link rel="stylesheet" href="style/general.css" type="text/css">
  <link rel="stylesheet" href="style/utils.css" type="text/css">
  <link rel="stylesheet" href="style/components/header.css" type="text/css">
  <link rel="stylesheet" href="style/components/tracker.css" type="text/css">
</head>

<body class="tracker">
                  <!-- header -->                         
  <header class="global-header container">

    <nav class="global-header__wrapper">

       <section class="global-header__left">
        <a href="index.html">
          <img class="global-header__left-home-icon-img" src="images/header/header-navbar/amazon-logo-white.png" alt="Amazon logo">
        </a>
      </section>

      <section class="global-header__middle">
        <form>
          <input class="global-header__middle-input input" placeholder="Search" type="search">
          <button class="global-header__middle-btn">
            <img class="global-header__middle-search-icon-img" src="images/header/header-navbar/search-icon.png" alt="Search-Icon">
          </button>
        </form>
      </section>
      
      <section class="global-header__right">
        <a class="global-header__right-return" href="orders.html">
          <span class="global-header__right-line1">Returns</span>
          <span class="global-header__right-line2">& Orders</span>
        </a>
        <a class="global-header__right-cart" href="checkout.html"> 
          <img class="global-header__right-cart-icon" src="images/header/header-navbar/cart-icon.png" alt="Cart-Icon">
          <div class="global-header__right-cart-count js-cart-count">0</div>
          <div class="global-header__right-cart-text">Cart</div>
        </a>
      </section>

    </nav>
  </header>

                       <!-- MAIN -->                         

  <main class="hero-section-tracker container">
    <a class="tracker__order-hyperlink" href="orders.html">View all orders</a>

    <article class="tracker__product-card">

      <h1 class="tracker__product-order-date"></h1>
      <span class="tracker__product-name">Intermediate Size Basketball</span>
      <span class="tracker__product-quantity">Quantity: 1</span>
      <div class="tracker__product-image-cont">
        <img class="tracker__product-image" src="images/main/product-image/athletic-cotton-socks-6-pairs.jpg" alt="Product-Image">
      </div>
              
      <!-- progress -->

      <div class="tracker__product-progress-cont">
        <span class="tracker__product-progress-prepare-txt">Preparing</span>
        <span class="tracker__product-progress-ship-txt">Shipped</span>
        <span class="tracker__product-progress-delivery-txt">Delivered</span>  
      </div>
      <div class="tracker__product-progress-flow-cont">
        <div class="tracker__product-progress-flows"></div>
      </div>

    </article>


  </main>

  <script type="module" src="./scripts/tracker.js"></script>


</body>
</html>
