<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Amazon</title>
  
  <!-- description in the web -->
  <meta name="description" content="Amazon CRUD application"/>

  <!-- cdnfonts ember -->
  <link href="https://fonts.cdnfonts.com/css/amazon-ember?styles=109935,109928,109932,109925" rel="stylesheet">
  <!-- fallback font google roboto-->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

  
  <link rel="stylesheet" href="style/general.css" type="text/css">
  <link rel="stylesheet" href="style/utils.css" type="text/css">
  <link rel="stylesheet" href="style/components/header.css" type="text/css">
  <link rel="stylesheet" href="style/components/checkout.css" type="text/css">
  

</head>
<body class="checkout">

                        <!-- header -->
                          
  <header class="global-header container">

    <nav class="global-header__wrapper">

      <section class="global-header__left">
        <a href="index.html">
          <img class="global-header__left-home-icon-img" src="images/checkout/icons/amazon-logo.png" alt="Amazon logo">
        </a>
      </section>

      <section class="global-header__middle">
        <span class="global-header__middle-text">Checkout ( <a class="global-header__middle-highlight-text">2 items</a> )</span>
      </section>
      
      <section class="global-header__right">
      </section>

    </nav>
  </header>

                          <!-- main -->

  <main class="checkout-cart-container container"> 
    

      <h2 class="checkout-cart-container__heading">Review your order</h2>

    
     <!-- main section -->
    
     <section class="checkout-cart__delivery-wrapper">
       <section class="checkout-cart-container__left-wrapper js-checkout-cart-container__left-wrapper">
          <!-- left section -->
           
        </section>

        <!-- right section -->
        <section class="checkout-cart-container__right-order-summary-cont">
          <section class="checkout__right-wrapper">
            <h3>Order Summary</h3>
            <ol>
              <li>
                <span>Items (2):</span>
                <span>$41.90</span>
              </li>
              <li>
                <span>Shipping & handling:</span>
                <span>$4.99</span>
              </li>
              <li>
                <span>Total before tax:</span>
                <span>$46.89</span>
              </li>
              <li>  
                <span>Estimated tax (10%):</span>
                <span>$4.69</span>
              </li>
              <hr>
              <li>
                <span class="checkout__right-order-total-text">Order total:</span>
                <span class="checkout__right-order-total-text">$51.58</span>
              </li>
            </ol>
          </section>
          <button class="checkout__right-order-btn">Place Your Order</button>
        <section>
     </section>

  </main>
  
  <script type="module" src="./scripts/checkout.js"></script>
</body>
</html>
